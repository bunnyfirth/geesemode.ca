              background:#4a90e2;
              color:white;
              font-size:16px;
              cursor:pointer;
            "
          >
            ${answer}
          </button>
        `).join("")}

      </div>

    </div>
  `;
}

function selectAnswer(index) {

  const q = questions[currentQuestion];

  if (index === q.correct) {
    score++;
  } else {
    wrongList.push({
      question: q.question,
      yourAnswer: q.answers[index],
      correctAnswer: q.answers[q.correct]
    });
  }

  currentQuestion++;
  loadQuestion();
}

function showResults() {

  document.getElementById("quiz").style.display = "none";
  document.getElementById("resultSection").style.display = "block";

  // Progress Circle
  const percent = score / questions.length;
  const circumference = 440;
  const offset = circumference - (percent * circumference);

  document.getElementById("progressCircle")
    .style.strokeDashoffset = offset;

  document.getElementById("scoreText")
    .innerHTML = `${score}/10`;

  // Random Messages
  let messages = [];

  if (score === 10) {

    messages = [
      `🏆 PERFECT SCORE! You got ${score}/10! You are the Ultimate Goose Master!`,
      `🪿 Incredible! You got ${score}/10! Goose knowledge level: LEGENDARY!`,
      `⭐ Amazing job! ${score}/10! You know EVERYTHING about geese!`
    ];

  } else if (score >= 7) {

    messages = [
      `🎉 Great job! You got ${score}/10! You have great goose knowledge!`,
      `🪿 Awesome work! ${score}/10! You're practically a goose expert!`,
      `👏 Nice! You scored ${score}/10! The geese are impressed!`
    ];

  } else if (score >= 4) {

    messages = [
      `👍 Pretty good! You got ${score}/10!`,
      `🪿 Not bad! ${score}/10! Your goose skills are growing!`,
      `✨ Good effort! You scored ${score}/10!`
    ];

  } else {

    messages = [
      `😅 Better luck next time! You got ${score}/10.`,
      `🪿 Oh no! ${score}/10! The geese escaped your knowledge.`,
      `📚 You got ${score}/10. Time to study more goose facts!`
    ];
  }

  const randomMessage =
    messages[Math.floor(Math.random() * messages.length)];

  document.getElementById("message").innerHTML = randomMessage;

  // Wrong Answers
  let wrongHTML = "";

  if (wrongList.length > 0) {

    wrongHTML += `
      <h3 style="margin-top:0;">❌ Questions You Got Wrong</h3>
    `;

    wrongList.forEach((item, i) => {

      wrongHTML += `
        <div style="
          margin-bottom:20px;
          padding:12px;
          background:white;
          border-radius:8px;
          border-left:5px solid #ff5c5c;
        ">

          <strong>Question ${i + 1}:</strong>
          <br><br>

          ${item.question}

          <br><br>

          <span style="color:#d33;">
            Your Answer: ${item.yourAnswer}
          </span>

          <br>

          <span style="color:#2e8b57;">
            Correct Answer: ${item.correctAnswer}
          </span>

        </div>
      `;
    });

  } else {

    wrongHTML = `
      <div style="
        background:#e8ffe8;
        padding:20px;
        border-radius:10px;
        font-size:20px;
        font-weight:bold;
        color:#2e8b57;
      ">
        🎉 You got every question correct!
      </div>
    `;
  }

  document.getElementById("wrongAnswers").innerHTML = wrongHTML;
}

loadQuestion();
</script></div>
  </div>
